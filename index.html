<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="Programación de Servicios y Actividades - Iglesia Evangélica Hermanos en Cristo">
<link rel="manifest" href="manifest.json">
<title>IEHC · Programación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-pale: #f5e6c0;
    --dark: #0d0d1a;
    --dark2: #141428;
    --dark3: #1e1e38;
    --dark4: #252540;
    --white: #f8f4ee;
    --cream: #ede8de;
    --text-muted: #8888aa;
    --red: #e05555;
    --green: #4caf79;
    --blue: #5580e0;
    --border: rgba(201,168,76,0.2);
    --shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(85,128,224,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2.5rem 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(201,168,76,0.08) 0%, transparent 100%);
  }

  .cross-icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    color: var(--gold);
    display: block;
    letter-spacing: 0.1em;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--gold-light);
    text-transform: uppercase;
    line-height: 1.3;
  }

  header p {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
    font-style: italic;
  }

  /* ===== NAVIGATION TABS ===== */
  nav {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    padding: 0.5rem 1.2rem;
    border-radius: 2rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .tab:hover { color: var(--gold); border-color: var(--gold); }
  .tab.active {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
    font-weight: 600;
  }

  /* ===== MAIN CONTENT ===== */
  main {
    position: relative;
    z-index: 5;
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ===== CARDS ===== */
  .card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.3s;
  }

  .card:hover { border-color: rgba(201,168,76,0.4); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    color: var(--gold-light);
  }

  .badge {
    font-size: 0.72rem;
    padding: 0.2rem 0.7rem;
    border-radius: 2rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.06em;
  }

  .badge-gold { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .badge-blue { background: rgba(85,128,224,0.15); color: #88aaff; border: 1px solid rgba(85,128,224,0.3); }
  .badge-green { background: rgba(76,175,121,0.15); color: #7fd9a4; border: 1px solid rgba(76,175,121,0.3); }

  /* ===== NEXT SERVICE BANNER ===== */
  .next-service-banner {
    background: linear-gradient(135deg, rgba(201,168,76,0.13) 0%, rgba(201,168,76,0.04) 100%);
    border: 1px solid rgba(201,168,76,0.45);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .next-service-banner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--gold-light), var(--gold));
    border-radius: 4px 0 0 4px;
  }

  .next-service-banner::after {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .next-service-icon {
    font-size: 2rem;
    flex-shrink: 0;
    filter: drop-shadow(0 0 10px rgba(201,168,76,0.45));
  }

  .next-service-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }

  .next-service-date {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: var(--gold-light);
    font-weight: 600;
    margin-bottom: 0.6rem;
    text-shadow: 0 0 20px rgba(201,168,76,0.3);
  }

  .next-service-roles {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .next-role-chip {
    font-size: 0.75rem;
    padding: 0.22rem 0.7rem;
    border-radius: 2rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
  }

  .next-role-chip strong {
    color: var(--gold-light);
    font-weight: 600;
  }

  .next-service-tipo {
    margin-left: auto;
    flex-shrink: 0;
    text-align: right;
    align-self: flex-start;
  }

  .pulse-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse-anim 2s infinite;
    margin-right: 0.45rem;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  @keyframes pulse-anim {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(201,168,76,0.5); }
    50% { opacity: 0.6; box-shadow: 0 0 0 5px rgba(201,168,76,0); }
  }

  /* ===== SCHEDULE TABLE ===== */
  .schedule-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  .schedule-table th {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
    padding: 0.7rem 0.8rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .schedule-table td {
    padding: 0.8rem 0.8rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
    color: var(--cream);
  }

  .schedule-table tr:last-child td { border-bottom: none; }

  .schedule-table tr:hover td {
    background: rgba(201,168,76,0.04);
  }

  .today-row td {
    background: rgba(201,168,76,0.08) !important;
    border-left: 3px solid var(--gold);
  }

  .date-cell {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    color: var(--gold-light);
    white-space: nowrap;
  }

  .service-chip {
    display: inline-block;
    font-size: 0.72rem;
    padding: 0.15rem 0.6rem;
    border-radius: 1rem;
    background: rgba(85,128,224,0.12);
    color: #99bbff;
    border: 1px solid rgba(85,128,224,0.2);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.04em;
  }

  /* ===== SERVIDOR CARDS ===== */
  .servidor-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .servidor-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .servidor-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  .servidor-card.selected {
    border-color: var(--gold);
    background: var(--dark3);
  }

  .servidor-name {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    color: var(--gold-light);
    margin-bottom: 0.4rem;
  }

  .servidor-count {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .notification-btn {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 0.8rem;
    padding: 0.4rem 0.8rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    transition: all 0.3s;
    width: 100%;
    justify-content: center;
  }

  .notification-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .notification-btn.active {
    background: rgba(76,175,121,0.1);
    border-color: var(--green);
    color: var(--green);
  }

  /* ===== DETAIL PANEL ===== */
  #servidor-detail {
    display: none;
    margin-top: 1.5rem;
  }

  #servidor-detail.visible { display: block; }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
  }

  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--dark4));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--dark);
    border: 2px solid var(--gold);
    flex-shrink: 0;
  }

  .service-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 0.5rem;
    background: var(--dark3);
  }

  .service-item .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  .service-item .date { font-size: 0.78rem; color: var(--gold-light); font-family: 'Cinzel', serif; min-width: 90px; }
  .service-item .role { font-size: 0.85rem; color: var(--cream); }
  .service-item .day-type { font-size: 0.72rem; color: var(--text-muted); font-style: italic; }

  /* ===== TOGGLE VISTA CALENDARIO ===== */
  .cal-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .cal-toolbar-left {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
    flex: 1;
  }

  .view-toggle {
    display: flex;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .view-toggle-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 0.45rem 0.75rem;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
  }

  .view-toggle-btn:first-child {
    border-right: 1px solid var(--border);
  }

  .view-toggle-btn.active {
    background: var(--gold);
    color: var(--dark);
  }

  .view-toggle-btn:not(.active):hover {
    color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  /* ===== SERVICE CARDS (modo tarjeta) ===== */
  .service-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  .service-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .service-card:hover {
    border-color: rgba(201,168,76,0.45);
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  .service-card.is-today {
    border-color: rgba(201,168,76,0.6);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.2);
  }

  .service-card-top {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--border);
  }

  .service-card-date {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 70px;
    padding: 0.9rem 0.7rem;
    background: linear-gradient(180deg, rgba(201,168,76,0.18) 0%, rgba(201,168,76,0.06) 100%);
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }

  .service-card.is-today .service-card-date {
    background: linear-gradient(180deg, rgba(201,168,76,0.32) 0%, rgba(201,168,76,0.12) 100%);
  }

  .sc-day-num {
    font-family: 'Cinzel', serif;
    font-size: 1.65rem;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }

  .sc-month {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 0.12rem;
  }

  .sc-weekday {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 0.18rem;
    font-style: italic;
  }

  .service-card-meta {
    flex: 1;
    padding: 0.85rem 1rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.3rem;
  }

  .sc-tipo-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .sc-today-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 0.1rem 0.5rem;
    border-radius: 1rem;
    animation: pulse-anim 2s infinite;
  }

  .service-card-roles {
    padding: 0.75rem 1rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }

  .sc-role-item {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }

  .sc-role-label {
    font-family: 'Cinzel', serif;
    font-size: 0.56rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .sc-role-name {
    font-size: 0.82rem;
    color: var(--cream);
    line-height: 1.3;
  }

  .sc-role-name.empty { color: var(--text-muted); font-style: italic; }

  .service-card-accent {
    height: 3px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .service-card.is-today .service-card-accent {
    background: linear-gradient(90deg, var(--gold-light), var(--gold), transparent);
    animation: shimmer 2s infinite;
  }

  /* ===== STATS CARDS (corregido) ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
  }

  .stat-number {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    color: var(--gold-light);
    display: block;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  /* ===== ADMIN STYLES (corregido) ===== */
  .admin-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }

  .admin-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
    font-style: italic;
  }

  #pwa-install-btn {
    display: none;
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    z-index: 100;
  }

  /* ===== ACTIVIDADES ===== */
  .actividad-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }
  .actividad-card:hover { border-color: rgba(201,168,76,0.45); transform: translateY(-2px); }
  .actividad-card.pasada { opacity: 0.52; }

  .actividad-accent {
    height: 3px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }
  .actividad-card.proxima .actividad-accent {
    background: linear-gradient(90deg, #aaccff, var(--blue), transparent);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .actividad-inner {
    display: flex;
    align-items: stretch;
  }

  .actividad-date-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 74px;
    padding: 1rem 0.8rem;
    background: linear-gradient(180deg, rgba(201,168,76,0.16) 0%, rgba(201,168,76,0.05) 100%);
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .actividad-date-block .dia-num {
    font-family: 'Cinzel', serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }
  .actividad-date-block .dia-mes {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 0.15rem;
  }
  .actividad-date-block .dia-sem {
    font-size: 0.67rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
    font-style: italic;
  }

  .actividad-body {
    flex: 1;
    padding: 0.9rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .actividad-titulo {
    font-family: 'Cinzel', serif;
    font-size: 0.92rem;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }
  .actividad-desc {
    font-size: 0.87rem;
    color: var(--cream);
    line-height: 1.45;
  }
  .actividad-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.2rem;
  }
  .actividad-chip {
    font-size: 0.68rem;
    padding: 0.13rem 0.58rem;
    border-radius: 1rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.04em;
  }
  .chip-hora  { background: rgba(85,128,224,0.13); color: #99bbff; border: 1px solid rgba(85,128,224,0.25); }
  .chip-lugar { background: rgba(76,175,121,0.12);  color: #7fd9a4; border: 1px solid rgba(76,175,121,0.25); }
  .chip-tipo  { background: rgba(201,168,76,0.12);  color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }

  .proxima-actividad-banner {
    background: linear-gradient(135deg, rgba(85,128,224,0.13) 0%, rgba(85,128,224,0.04) 100%);
    border: 1px solid rgba(85,128,224,0.4);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .proxima-actividad-banner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;

// ============================================================

function formatDate(str) {
  const [y,m,d] = str.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function getMonths() {
  const months = [...new Set(services.map(s => s.fecha.slice(0,7)))].sort();
  return months;
}

function getServidores() {
  const all = new Set();
  services.forEach(s => {
    [s.direccion, s.lectura, s.ofrenda, s.predicacion].forEach(n => { if(n) all.add(n.trim()); });
  });
  return [...all].sort();
}

function getServicesByServidor(name) {
  const result = [];
  services.forEach(s => {
    const roles = [];
    if (s.direccion === name) roles.push('Dirección');
    if (s.lectura === name) roles.push('Lectura Bíblica');
    if (s.ofrenda === name) roles.push('Ofrenda');
    if (s.predicacion === name) roles.push('Predicación');
    if (roles.length > 0) result.push({ ...s, roles });
  });
  return result.sort((a,b) => a.fecha.localeCompare(b.fecha));
}

function getNextService() {
  const today = todayStr();
  return services.filter(s => s.fecha >= today).sort((a,b) => a.fecha.localeCompare(b.fecha))[0] || null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

  document.getElementById('view-' + v).classList.add('active');
  
  // Corregido: encontrar el botón correspondiente
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    if (tab.getAttribute('onclick')?.includes(v)) {
      tab.classList.add('active');

  window.scrollTo({ top: 0, behavior: 'smooth' });

function renderCalendar() {
  const sel = document.getElementById('cal-month');
  const months = getMonths();

  if (!sel.options.length || sel.dataset.built !== '1') {
    sel.innerHTML = '';
    const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    months.forEach(m => {
      const [y,mo] = m.split('-');
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = `${monthNames[parseInt(mo)-1]} ${y}`;
      sel.appendChild(opt);
    });
    sel.dataset.built = '1';
    const today = todayStr().slice(0,7);
    if (months.includes(today)) sel.value = today;
    else if (months.length) sel.value = months[months.length-1];
  }

  // Restore saved view mode
  document.getElementById('btn-tabla').classList.toggle('active', calViewMode === 'tabla');
  document.getElementById('btn-tarjetas').classList.toggle('active', calViewMode === 'tarjetas');

  const month = sel.value;
  const filtered = services.filter(s => s.fecha.startsWith(month)).sort((a,b) => a.fecha.localeCompare(b.fecha));
  document.getElementById('cal-total').textContent = filtered.length + ' servicios';

  if (calViewMode === 'tabla') renderCalTable(filtered);
  else renderCalCards(filtered);

  renderNextServiceBanner();
}

function showServidor(name) {
  const svs = getServicesByServidor(name);
  const detail = document.getElementById('servidor-detail');
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  detail.classList.add('visible');

  const today = todayStr();
  const upcoming = svs.filter(s => s.fecha >= today);
  const past = svs.filter(s => s.fecha < today);

  let html = `
    <div class="card">
      <div class="detail-header">
        <div class="avatar">${initials}</div>
        <div>
          <div class="card-title">${name}</div>
          <div class="servidor-count">${upcoming.length} próximos · ${past.length} pasados</div>
        </div>
      </div>
  `;

  if (upcoming.length) {
    html += `<p class="section-title" style="margin-top:0">Próximos Servicios</p>`;
    upcoming.forEach(s => {
      html += `
        <div class="service-item">
          <div class="dot"></div>
          <div class="date">${formatDate(s.fecha)}</div>
          <div>
            <div class="role">${s.roles.join(' · ')}</div>
            <div class="day-type">${s.tipo}</div>
          </div>
        </div>
      `;
    });
  }

  if (past.length) {
    html += `<p class="section-title">Servicios Pasados</p>`;
    past.slice(-3).reverse().forEach(s => {
      html += `
        <div class="service-item" style="opacity:0.5">
          <div class="dot" style="background:var(--text-muted)"></div>
          <div class="date">${formatDate(s.fecha)}</div>
          <div>
            <div class="role">${s.roles.join(' · ')}</div>

  if (!svs.length) {
    html += `<div class="empty-state">No hay servicios asignados</div>`;
  }

  html += '</div>';
  detail.innerHTML = html;
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ============================================================
// NOTIFICATIONS
// ============================================================
async function toggleNotif(e, name) {
  e.stopPropagation();
  
  if (notifSubscriptions[name]) {
    delete notifSubscriptions[name];
    saveNotifs();
    renderServidores();
    showToast('🔕 Notificaciones desactivadas para ' + name.split(' ')[0]);
    return;
  }

  if (!('Notification' in window)) {
    showToast('⚠️ Tu navegador no soporta notificaciones');
    return;
  }

  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    notifSubscriptions[name] = true;
    saveNotifs();
    renderServidores();
    showToast('🔔 Notificaciones activadas para ' + name.split(' ')[0]);
    scheduleNotifications(name);
  } else {
    showToast('❌ Permiso de notificaciones denegado');
  }
}

function scheduleNotifications(name) {
  const svs = getServicesByServidor(name);
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = tomorrow.toISOString().slice(0,10);

  svs.forEach(s => {
    if (s.fecha === tomorrowStr) {
      new Notification('⛪ IEHC · Recordatorio de Servicio', {
        body: `${name}: mañana tienes ${s.roles.join(' y ')} (${s.tipo})`,
        icon: 'icon-192.png',
        tag: 'iehc-' + s.id
      });
    }
  });
}

function checkDailyNotifications() {
  if (Notification.permission !== 'granted') return;
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = tomorrow.toISOString().slice(0,10);

  Object.keys(notifSubscriptions).forEach(name => {
    const svs = getServicesByServidor(name);
    svs.forEach(s => {
      if (s.fecha === tomorrowStr) {
        new Notification('⛪ IEHC · Servicio Mañana', {
          body: `Hola ${name.split(' ')[0]}! Mañana te toca ${s.roles.join(' y ')} en el servicio del ${s.tipo}`,
          icon: 'icon-192.png',
          tag: 'iehc-remind-' + s.id
        });
      }
    });
  });
}

const DIAS_SEM = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES_CORTOS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_LARGOS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function format12h(hora) {
  if (!hora) return '';
  // Already in 12h format (e.g. "5:30 PM")
  if (/[AP]M/i.test(hora)) return hora;
  // Convert from 24h (HH:MM)
  const [h, m] = hora.split(':').map(Number);
  const period = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${period}`;
}

// Función parseFechaLocal unificada (corregida)
function parseFechaLocal(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatActDate(str) {
  const d = parseFechaLocal(str);
  return { dia: d.getDate(), mes: MESES_CORTOS[d.getMonth()], sem: DIAS_SEM[d.getDay()] };
}

function formatActFull(str) {
  const d = parseFechaLocal(str);
  return `${d.getDate()} de ${MESES_LARGOS[d.getMonth()]} ${d.getFullYear()}`;
}

function renderActividadesList(filtro) {
  const container = document.getElementById('actividades-list');
  const today = todayStr();

  let lista = [...actividades].sort((a,b) => a.fecha.localeCompare(b.fecha));

  if (filtro === 'proximas') {
    lista = lista.filter(a => a.fecha >= today);
  } else if (filtro === 'pasadas') {
    lista = lista.filter(a => a.fecha < today).reverse();
  } else if (filtro !== 'todas') {
    lista = lista.filter(a => a.tipo === filtro);
  }

  if (!lista.length) {
    container.innerHTML = `
      <div class="act-empty">
        <span class="act-empty-icon">📋</span>
        <p>${actividades.length === 0
          ? 'Aún no hay actividades registradas.'
          : 'No hay actividades para este filtro.'
        }</p>
      </div>`;
    return;
  }

  container.innerHTML = lista.map(a => {
    const { dia, mes, sem } = formatActDate(a.fecha);
    const isPast = a.fecha < today;
    const isNext = getNextActividad()?.id === a.id;

    return `
      <div class="actividad-card ${isPast ? 'pasada' : ''} ${isNext ? 'proxima' : ''}">
        <div class="actividad-accent"></div>
        <div class="actividad-inner">
          <div class="actividad-date-block">
            <span class="dia-num">${dia}</span>
            <span class="dia-mes">${mes}</span>
            <span class="dia-sem">${sem}</span>
          </div>
          <div class="actividad-body">
            <div class="actividad-titulo">${a.titulo}</div>
            ${a.desc ? `<div class="actividad-desc">${a.desc}</div>` : ''}
            <div class="actividad-meta">
              <span class="actividad-chip chip-tipo">${a.tipo}</span>
              ${a.hora ? `<span class="actividad-chip chip-hora">🕐 ${format12h(a.hora)}</span>` : ''}
              ${a.lugar ? `<span class="actividad-chip chip-lugar">📍 ${a.lugar}</span>` : ''}
              ${isPast ? `<span class="actividad-chip" style="background:rgba(136,136,170,0.1);color:var(--text-muted);border:1px solid rgba(136,136,170,0.2);">Realizada</span>` : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// ASEO DATA STORE
// ============================================================
const ASEO_VERSION = '2026-aseo-v1';
if (localStorage.getItem('iehc_aseo_version') !== ASEO_VERSION) {
  localStorage.removeItem('iehc_aseo');
  localStorage.setItem('iehc_aseo_version', ASEO_VERSION);
}

let aseoData = JSON.parse(localStorage.getItem('iehc_aseo') || 'null');
if (!aseoData) {
  aseoData = [
    // Marzo 2026
    { id:1,  fecha:'2026-03-01', familia:'Montoya-Gonzalez' },
    { id:2,  fecha:'2026-03-08', familia:'Gonzalez-Rivera'  },
    { id:3,  fecha:'2026-03-15', familia:'Nuñez-Izaguirre'  },
    { id:4,  fecha:'2026-03-22', familia:'Gonzalez-Escoto'  },
    { id:5,  fecha:'2026-03-29', familia:'Gomez-Gonzales'   },
  ];
  saveAseo();
}

function saveAseo() {
  localStorage.setItem('iehc_aseo', JSON.stringify(aseoData));
}

function getNextAseo() {
  const today = todayStr();
  return aseoData.filter(a => a.fecha >= today).sort((a,b) => a.fecha.localeCompare(b.fecha))[0] || null;
}

function getAseoMonths() {
  return [...new Set(aseoData.map(a => a.fecha.slice(0,7)))].sort();
}

// ============================================================
// ASEO VIEW
// ============================================================
function renderAseo() {
  renderProximaAseoBanner();
  renderAseoMonthSelector();
  renderAseoList();
}

function renderProximaAseoBanner() {
  const banner = document.getElementById('proxima-aseo-banner');
  const next = getNextAseo();
  if (!next) { banner.style.display = 'none'; return; }

  banner.style.display = 'flex';
  document.getElementById('pab-aseo-familia').textContent = next.familia;

  const chips = [];
  chips.push(`<span class="next-role-chip">📅 ${formatActFull(next.fecha)}</span>`);
  const { sem } = formatActDate(next.fecha);
  chips.push(`<span class="next-role-chip">📆 ${sem}</span>`);
  document.getElementById('pab-aseo-meta').innerHTML = chips.join('');
}

function renderAseoMonthSelector() {
  const sel = document.getElementById('aseo-month-sel');
  const months = getAseoMonths();
  const curVal = sel.value;

  sel.innerHTML = '';
  months.forEach(m => {
    const [y, mo] = m.split('-');
    const label = MESES_LARGOS[parseInt(mo)-1] + ' ' + y;
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = label;
    sel.appendChild(opt);
  });

  // Default: current or nearest month
  const todayMonth = todayStr().slice(0,7);
  if (months.includes(curVal)) {
    sel.value = curVal;
  } else if (months.includes(todayMonth)) {
    sel.value = todayMonth;
  } else {
    sel.value = months[0] || '';
  }

  const count = aseoData.filter(a => a.fecha.startsWith(sel.value)).length;
  document.getElementById('aseo-total').textContent = count + (count === 1 ? ' domingo' : ' domingos');
}

function renderAseoList() {
  const container = document.getElementById('aseo-list');
  const selMonth = document.getElementById('aseo-month-sel').value;
  const today = todayStr();
  const next = getNextAseo();

  const lista = aseoData
    .filter(a => a.fecha.startsWith(selMonth))
    .sort((a,b) => a.fecha.localeCompare(b.fecha));

  if (!lista.length) {
    container.innerHTML = `<div class="act-empty"><span class="act-empty-icon">🧹</span><p>No hay programación de aseo para este mes.</p></div>`;
    return;
  }

  container.innerHTML = lista.map(a => {
    const { dia, mes, sem } = formatActDate(a.fecha);
    const isPast = a.fecha < today;
    const isToday = a.fecha === today;
    const isNext = next?.id === a.id;

    return `
      <div class="aseo-card ${isPast ? 'pasada' : ''} ${isNext ? 'proxima' : ''}">
        <div class="aseo-accent"></div>
        <div class="aseo-inner">
          <div class="aseo-date-block">
            <span class="dia-num">${dia}</span>
            <span class="dia-mes">${mes}</span>
            <span class="dia-sem">${sem}</span>
          </div>
          <div class="aseo-body">
            <div class="aseo-familia-nombre">🏠 ${a.familia}</div>
            <div class="aseo-chips">
              <span class="aseo-chip">Aseo</span>
              ${isToday ? `<span class="aseo-chip aseo-chip-today">⚡ Hoy</span>` : ''}
              ${isPast && !isToday ? `<span class="aseo-chip aseo-chip-past">Realizado</span>` : ''}
              ${isNext && !isToday ? `<span class="aseo-chip" style="background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.25);">Próximo</span>` : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// PWA INSTALL
// ============================================================
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('pwa-install-btn').style.display = 'flex';
});

document.getElementById('pwa-install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  if (result.outcome === 'accepted') showToast('✅ App instalada');
  deferredPrompt = null;
  document.getElementById('pwa-install-btn').style.display = 'none';
});

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  renderCalendar();
  checkDailyNotifications();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.unregister());
    });
  }
});
</script>
